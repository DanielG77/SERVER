version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tournaments-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tournaments_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tournaments-net

  backend:
    build:
      context: "./Tournaments Server"
      dockerfile: Dockerfile
    container_name: tournaments-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-tournaments_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - tournaments-net

  frontend:
    build:
      context: "./Frontend"
      dockerfile: Dockerfile
      args:
        VITE_STRIPE_KEY: ${VITE_STRIPE_KEY} # Coincide con Dockerfile
    container_name: tournaments-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - tournaments-net

volumes:
  postgres_data:


networks:
  tournaments-net:
    driver: bridge
