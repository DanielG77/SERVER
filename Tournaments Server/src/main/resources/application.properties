# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/feizdb
spring.datasource.username=postgres
spring.datasource.password=.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA Configuration
# Logging específico para RefreshTokenService y otros servicios
# logging.level.com.tournaments.application.service=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.tournaments.application.service.RefreshTokenService=DEBUG
# logging.level.com.tournaments.infrastructure.persistence=DEBUG
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
logging.level.com.tournaments.infrastructure.security=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.tournaments.application.service.impl.AuthServiceImpl=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# Flyway Migrations (si usas Flyway) o Liquibase
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT Configuration
jwt.expiration=86400000
JWT_SECRET=7nUKECHD/E0L/HKT1Zj4tUbKLGZtvbcIOQkCCwrbrGc=
jwt.access-token.expiration=3600000
jwt.refresh-token.expiration=604800000
jwt.access-token.seconds=3600
jwt.refresh-token.seconds=604800

# JSON Serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false

# Logging
logging.level.com.feiz=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.tournaments=DEBUG
